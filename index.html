<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <title>Wanderworldi Maailm</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        #world {
            position: relative; 
            width: 800px; 
            height: 600px; 
            background-color: #222;
            background-image: radial-gradient(#333 1px, transparent 1px);
            background-size: 20px 20px;
            border: 4px solid #444;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
            cursor: crosshair;
        }

        .player {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.5s ease;
        }

        .player img {
            width: 32px;
            height: 32px;
            image-rendering: pixelated;
        }

        .player .username {
            font-size: 12px;
            background: rgba(0, 0, 0, 0.6);
            padding: 2px 6px;
            border-radius: 4px;
            margin-top: 4px;
        }

        .speech-bubble {
            position: absolute;
            bottom: 55px;
            background: white;
            color: black;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 14px;
            min-width: 60px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            white-space: nowrap;
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid white;
        }

        .controls {
            background: #333;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        input {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #555;
            background: #444;
            color: white;
        }

        button {
            padding: 8px 15px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #27ae60;
        }

        .info {
            margin-top: 10px;
            font-size: 0.9em;
            color: #888;
        }
    </style>
</head>
<body>

    <h1>Wanderworld Explorer</h1>

    <div id="world">
        <div class="player" style="left: 400px; top: 300px;">
            <div class="speech-bubble">Tere tulemast, rändur!</div>
            <img src="https://tinkr.tech/sdb_apps/wanderworld/images/cow.png" alt="Lehm">
            <div class="username">Lehm</div>
        </div>

        <div class="player" style="left: 150px; top: 200px;">
            <img src="https://tinkr.tech/sdb_apps/wanderworld/images/player.png" alt="Mängija">
            <div class="username">Alice</div>
        </div>
    </div>

    <div class="controls">
        <input type="text" id="nameInput" placeholder="Sinu nimi">
        <button>Sisene maailma</button>
        
        <input type="text" id="chatInput" placeholder="Ütle midagi...">
        <button>Saada</button>
    </div>

    <div class="info">
        Liikumiseks klõpsa maailmas suvalisse kohta.
    </div>
    <script src="script.js"></script>
</body>
</html>
